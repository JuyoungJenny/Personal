   v:[{tp:"쿠폰(10~20%/우위5%) + 적립(5~10%/우위3%)",r:"-",gl:"-",pn:"쿠폰-8 + 적립-6",br:"적립 8%",ex:"쿠폰 열위구간(10~20%) 미해당 → 미적용 / 적립 8% 단독 적용"}]},
  {id:"3-5",g:"#3 혜택 2개",t:"다프 쿠폰+적립 → 둘 다 적용",
   c:53000,ss:{im:63000,pd:3330,dd:0,cd:0,ap:3158,sp:0,dv:1000},sp:57855,ir:"8.39%",
   v:[{tp:"쿠폰(5~15%/우위3%) + 적립(0~20%/우위7%)",r:"-",gl:"-",pn:"쿠폰-9 + 적립-9",br:"쿠폰 15% + 적립 4%",ex:"쿠폰 15% 적용(51,869) → 적립 목표 미달 → 적립 4% 추가 적용"}]},
];

const SO=["미진행","진행중","통과 ✅","실패 ❌","블로킹 🚫"];
const SC={"미진행":"bg-gray-100 text-gray-500","진행중":"bg-blue-100 text-blue-700","통과 ✅":"bg-green-100 text-green-700","실패 ❌":"bg-red-100 text-red-700","블로킹 🚫":"bg-yellow-100 text-yellow-700"};
const GR=[...new Set(TC.map(t=>t.g))];
const fmt=n=>n==null?"-":Number(n).toLocaleString();
const kst=()=>new Date(Date.now()+9*60*60*1000).toISOString().slice(0,16);
const ck=(id)=>id;
const ef=()=>({st:"미진행",ta:"",abr:"",asp:"",ar:"",mo:""});
const pts=ss=>{const b=ss.im-ss.pd-ss.dd-ss.cd;return{ba:Math.floor(b*.01),me:Math.floor(b*.02)};};

function App(){
  const[sel,setSel]=useState(TC[0]);
  const[form,setForm]=useState(ef());
  const[snaps,setSnaps]=useState([]);
  const[sb,setSb]=useState(true);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState("");
  const[loaded,setLoaded]=useState(false);
  const[imgs,setImgs]=useState([]);
  const[sc,setSc]=useState({});
  const fr=useRef();
  const key=ck(sel.id);

  useEffect(()=>{
    // 앱 마운트 시 전체 케이스 상태 한번에 로드
    const ids=TC.map(tc=>tc.id).join(",");
    fetch(SB_URL+"/rest/v1/test_records?select=case_id,status&case_id=in.("+ids+")&order=saved_at.desc",{headers:H})
      .then(r=>r.json())
      .then(rows=>{
        if(!Array.isArray(rows))return;
        const init={};
        rows.forEach(row=>{if(!init[row.case_id])init[row.case_id]=row.status??"미진행";});
        setSc(init);
      })
      .catch(()=>{});
  },[]);
  useEffect(()=>{
    setLoaded(false);setSnaps([]);setForm(ef());setImgs([]);
    api.getRecords(key).then(rows=>{
      if(Array.isArray(rows)&&rows.length>0){
        setSnaps(rows);
        const l=rows[0];
        setForm({st:l.status??"미진행",ta:l.tested_at??"",abr:l.actual_benefit_rate??"",asp:l.actual_sensed_price??"",ar:l.actual_result??"",mo:l.memo??""});
        setSc(p=>({...p,[key]:l.status??"미진행"}));
      }
      setLoaded(true);setMsg("✅ 로드됨");setTimeout(()=>setMsg(""),1500);
    }).catch(()=>{setLoaded(true);setMsg("⚠️ 로드 실패");});
  },[key]);

  const addSnap=async()=>{
    setSaving(true);
    const urls=imgs.filter(i=>!i.up).map(i=>i.url).filter(Boolean).join(",");
    const row={case_id:key,status:form.st,tested_at:form.ta||kst(),actual_benefit_rate:form.abr,actual_sensed_price:form.asp,actual_result:form.ar,memo:form.mo,image_urls:urls||null};
    const rows=await api.addRecord(row);
    if(Array.isArray(rows)&&rows[0]){setSnaps(p=>[rows[0],...p]);setSc(p=>({...p,[key]:form.st}));}
    setSaving(false);setMsg("💾 기록 저장됨");setTimeout(()=>setMsg(""),1500);
  };

  const delSnap=async id=>{
    await api.deleteRecord(id);
    setSnaps(p=>{const n=p.filter(s=>s.id!==id);setSc(c=>({...c,[key]:n[0]?.status??"미진행"}));return n;});
  };

  const upd=(f,v)=>setForm(p=>({...p,[f]:v}));

  const handleImgs=e=>{
    Array.from(e.target.files).forEach(async file=>{
      const tid=Date.now()+Math.random();
      const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'-');const path=key+"/"+tid+"_"+safeName;
      setImgs(p=>[...p,{tid,name:file.name,url:URL.createObjectURL(file),path,up:true}]);
      try{
        const url=await api.uploadImage(file,path);
        setImgs(p=>p.map(i=>i.tid===tid?{...i,url,up:false}:i));
      }catch(e){
        setImgs(p=>p.filter(i=>i.tid!==tid));
        alert("이미지 업로드 실패: "+e.message);
      }
    });
    e.target.value="";
  };

  const rmImg=async img=>{
    setImgs(p=>p.filter(i=>i.tid!==img.tid));
    if(img.path)await api.deleteImage(img.path);
  };

  const v=sel.v[0];
  const p=pts(sel.ss);
  const gst=tc=>sc[tc.id]??"미진행";
  const grpSt=g=>{
    const ss=TC.filter(tc=>tc.g===g).map(tc=>gst(tc));
    return ss.includes("실패 ❌")?"실패 ❌":ss.includes("블로킹 🚫")?"블로킹 🚫":ss.includes("진행중")?"진행중":ss.every(s=>s==="통과 ✅")?"통과 ✅":"미진행";
  };
  const done=TC.filter(tc=>gst(tc)==="통과 ✅").length;

  const S=(l,vl,ac)=><div style={{display:"flex",justifyContent:"space-between",padding:"2px 0"}}><span style={{fontSize:"11px",color:"#6b7280"}}>{l}</span><span style={{fontSize:"11px",fontWeight:"800",color:ac?"#dc2626":"#111827"}}>{vl}</span></div>;
  const ST=(l,vl)=><div><div style={{fontSize:"11px",color:"#93c5fd"}}>{l}</div><div style={{fontWeight:"800",color:"#1e3a8a",fontSize:"15px"}}>{vl}</div></div>;

  return(
    <div style={{fontFamily:"'Nanum Gothic',sans-serif",height:"100vh",display:"flex",background:"#f9fafb",fontSize:"14px"}}>
      <div style={{width:sb?"288px":"0",overflow:"hidden",transition:"width 0.2s",background:"white",borderRight:"1px solid #e5e7eb",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"16px",background:"linear-gradient(to right,#16a34a,#10b981)"}}>
          <div style={{color:"white",fontWeight:"800",fontSize:"15px"}}>🧪 다프 테스트 트래커</div>
          <div style={{color:"#bbf7d0",fontSize:"11px",marginTop:"2px"}}>상품 30개 / 정책 쿠폰10+적립10</div>
          <div style={{color:"#bbf7d0",fontSize:"11px",marginTop:"4px"}}>{done}/{TC.length} 완료</div>
          <div style={{marginTop:"8px",background:"#166534",borderRadius:"9999px",height:"6px"}}><div style={{background:"white",borderRadius:"9999px",height:"6px",width:(done/TC.length*100)+"%",transition:"width 0.3s"}}/></div>
        </div>
        <div style={{overflowY:"auto",flex:1,paddingTop:"8px",paddingBottom:"8px"}}>
          {GR.map(g=>{
            const gSt=grpSt(g);
            return(
            <div key={g}>
              <div style={{padding:"6px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase"}}>{g}</span>
                <span className={"text-xs px-1.5 py-0.5 rounded-full "+SC[gSt]}>{gSt==="미진행"?"-":gSt.split(" ")[1]??gSt}</span>
              </div>
              {TC.filter(tc=>tc.g===g).map(tc=>{
                const st=gst(tc);
                return(<button key={tc.id} onClick={()=>setSel(tc)} style={{width:"100%",textAlign:"left",padding:"8px 12px",background:sel.id===tc.id?"#f0fdf4":"transparent",border:"none",borderLeft:"2px solid "+(sel.id===tc.id?"#16a34a":"transparent"),cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"4px"}}>
                  <span style={{fontSize:"11px",color:"#374151",lineHeight:"1.4"}}>[{tc.id}] {tc.t}</span>
                  <span className={"text-xs px-1.5 py-0.5 rounded-full whitespace-nowrap flex-shrink-0 "+SC[st]}>{st==="미진행"?"-":st.split(" ")[1]??st}</span>
                </button>);
              })}
            </div>
          )})}
        </div>
      </div>

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"10px 16px",display:"flex",alignItems:"center",gap:"12px"}}>
          <button onClick={()=>setSb(s=>!s)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:"#9ca3af"}}>☰</button>
          <div style={{flex:1}}><div style={{fontWeight:"800",color:"#111827"}}>[{sel.id}] {sel.t}</div><div style={{fontSize:"11px",color:"#9ca3af"}}>{sel.g}</div></div>
          {(saving||msg)&&<span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"9999px",background:saving?"#eff6ff":"#f0fdf4",color:saving?"#3b82f6":"#16a34a"}}>{saving?"💾 저장 중...":msg}</span>}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:"12px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
            <div style={{background:"white",borderRadius:"12px",border:"1px solid #e5e7eb",padding:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",marginBottom:"8px"}}>혜택 정책</div>
              {S("유형",v.tp)}
              {S("열위 구간",v.r??"-")}
              {S("목표",v.gl)}
              <div style={{marginTop:"6px",paddingTop:"6px",borderTop:"1px solid #f3f4f6"}}>
                <span style={{fontSize:"10px",background:"#f0fdf4",color:"#16a34a",padding:"2px 6px",borderRadius:"4px",fontWeight:"800"}}>📋 {v.pn}</span>
              </div>
            </div>
            <div style={{background:"white",borderRadius:"12px",border:"1px solid #e5e7eb",padding:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",marginBottom:"8px"}}>경쟁사 가격</div>
              {S("경쟁사가",sel.c?fmt(sel.c)+"원":"미전파",true)}
            </div>
            <div style={{background:"white",borderRadius:"12px",border:"1px solid #e5e7eb",padding:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",marginBottom:"8px"}}>스스 가격</div>
              {S("즉시할인 후 가격",fmt(sel.ss.im)+"원")}
              {sel.ss.pd>0&&S("└ 상품할인","-"+fmt(sel.ss.pd)+"원")}
              {sel.ss.dd>0&&S("└ 상품중복할인","-"+fmt(sel.ss.dd)+"원")}
              {sel.ss.cd>0&&S("└ 장바구니할인","-"+fmt(sel.ss.cd)+"원")}
              {S("기본적립(1%)","-"+fmt(p.ba)+"원")}
              {S("멤버십적립(2%)","-"+fmt(p.me)+"원")}
              {sel.ss.ap>0&&S("추가적립","-"+fmt(sel.ss.ap)+"원")}
              {sel.ss.sp>0&&S("슈퍼적립","-"+fmt(sel.ss.sp)+"원")}
              {S("배송비",fmt(sel.ss.dv)+"원")}
            </div>
          </div>

          <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:"12px",padding:"16px"}}>
            <div style={{fontSize:"11px",fontWeight:"800",color:"#93c5fd",textTransform:"uppercase",marginBottom:"8px"}}>계산결과 (기대값)</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginBottom:"8px"}}>
              {ST("체감가(다프 적용 전)",fmt(sel.sp)+"원")}{ST("열위비율",sel.ir)}{ST("기대 혜택비율",v.br)}
            </div>
            <div style={{paddingTop:"8px",borderTop:"1px solid #bfdbfe"}}>
              <div style={{fontSize:"11px",color:"#93c5fd",marginBottom:"2px"}}>기대결과</div>
              <div style={{fontWeight:"800",color:"#1e3a8a"}}>{v.ex}</div>
              {sel.nt&&<div style={{fontSize:"11px",color:"#3b82f6",marginTop:"4px"}}>📌 {sel.nt}</div>}
            </div>
          </div>

          <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:"12px",padding:"16px",display:"flex",flexDirection:"column",gap:"12px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase"}}>테스트 기록 입력</div>
              <button onClick={addSnap} disabled={saving} style={{padding:"6px 16px",background:"#16a34a",color:"white",border:"none",borderRadius:"8px",fontSize:"12px",fontWeight:"800",cursor:"pointer",opacity:saving?0.5:1}}>{saving?"저장 중...":"+ 기록 추가"}</button>
            </div>
            <div style={{display:"flex",gap:"12px"}}>
              <div>
                <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>상태</label>
                <select value={form.st} onChange={e=>upd("st",e.target.value)} className={"rounded-lg border px-3 py-1.5 text-sm font-bold "+SC[form.st]}>{SO.map(s=><option key={s}>{s}</option>)}</select>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>시각 (KST)</label>
                <div style={{display:"flex",gap:"4px"}}>
                  <input type="datetime-local" value={form.ta} onChange={e=>upd("ta",e.target.value)} style={{flex:1,border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px"}}/>
                  <button onClick={()=>upd("ta",kst())} style={{padding:"6px 12px",background:"#f0fdf4",border:"1px solid #86efac",color:"#16a34a",borderRadius:"8px",fontSize:"11px",fontWeight:"800",cursor:"pointer",whiteSpace:"nowrap"}}>지금</button>
                </div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
              <div><label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>실제 적용된 혜택 비율</label><input value={form.abr} onChange={e=>upd("abr",e.target.value)} placeholder="예: 9%" style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",boxSizing:"border-box"}}/></div>
              <div><label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>실제 체감가</label><input value={form.asp} onChange={e=>upd("asp",e.target.value)} placeholder="예: 11,476" style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",boxSizing:"border-box"}}/></div>
            </div>
            <div><label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>실제 결과 / 이슈 내용</label><textarea value={form.ar} onChange={e=>upd("ar",e.target.value)} rows={2} placeholder="기대값과 다른 경우 실제 결과를 기록하세요..." style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",resize:"none",boxSizing:"border-box"}}/></div>
            <div><label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>메모</label><textarea value={form.mo} onChange={e=>upd("mo",e.target.value)} rows={2} placeholder="테스트 조건, 특이사항 등 자유롭게..." style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",resize:"none",boxSizing:"border-box"}}/></div>
            <div>
              <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>스크린샷 <span style={{color:"#9ca3af"}}>(Supabase Storage에 저장, 모든 기기에서 공유됨)</span></label>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {imgs.map((img,i)=>(
                  <div key={img.tid??i} style={{position:"relative",width:"80px",height:"80px",borderRadius:"8px",overflow:"hidden",border:"1px solid #e5e7eb"}}>
                    <img src={img.url} alt={img.name} style={{width:"100%",height:"100%",objectFit:"cover",opacity:img.up?0.5:1}}/>
                    {img.up&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px"}}>⏳</div>}
                    {!img.up&&<button onClick={()=>rmImg(img)} style={{position:"absolute",top:"2px",right:"2px",background:"#ef4444",color:"white",border:"none",borderRadius:"9999px",width:"16px",height:"16px",fontSize:"10px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>}
                  </div>
                ))}
                <button onClick={()=>fr.current.click()} style={{width:"80px",height:"80px",borderRadius:"8px",border:"2px dashed #d1d5db",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#9ca3af",gap:"4px"}}>
                  <span style={{fontSize:"20px",lineHeight:1}}>+</span><span style={{fontSize:"11px"}}>추가</span>
                </button>
              </div>
              <input ref={fr} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleImgs}/>
            </div>
          </div>

          {!loaded?(
            <div style={{textAlign:"center",padding:"16px",color:"#9ca3af",fontSize:"12px"}}>기록 불러오는 중...</div>
          ):snaps.length===0?(
            <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:"12px",padding:"24px",textAlign:"center",color:"#9ca3af",fontSize:"12px"}}>아직 저장된 기록이 없어요. 위에서 작성 후 <strong>+ 기록 추가</strong>를 눌러주세요.</div>
          ):(
            <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:"12px",padding:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",marginBottom:"12px"}}>저장된 기록 <span style={{background:"#dcfce7",color:"#16a34a",padding:"2px 6px",borderRadius:"9999px",fontSize:"11px"}}>{snaps.length}개</span></div>
              <div style={{position:"relative",paddingLeft:"16px"}}>
                <div style={{position:"absolute",left:"7px",top:"8px",bottom:"8px",width:"2px",background:"#e5e7eb"}}/>
                {snaps.map((snap,i)=>(
                  <div key={snap.id} style={{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"12px",position:"relative"}}>
                    <div style={{position:"relative",zIndex:1,width:"12px",height:"12px",borderRadius:"9999px",background:i===0?"#16a34a":"#d1d5db",border:"2px solid white",flexShrink:0,marginTop:"6px"}}/>
                    <div style={{flex:1,background:"#f9fafb",borderRadius:"12px",border:"1px solid #f3f4f6",padding:"12px"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          <span className={"text-xs px-2 py-0.5 rounded-full font-bold "+SC[snap.status]}>{snap.status}</span>
                          <span style={{fontSize:"11px",color:"#9ca3af"}}>{snap.tested_at?snap.tested_at.replace("T"," "):"시각 없음"}</span>
                        </div>
                        <button onClick={()=>delSnap(snap.id)} style={{fontSize:"11px",color:"#d1d5db",background:"none",border:"none",cursor:"pointer"}}>삭제</button>
                      </div>
                      {(snap.actual_benefit_rate||snap.actual_sensed_price)&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"6px"}}>{snap.actual_benefit_rate&&S("혜택 비율",snap.actual_benefit_rate)}{snap.actual_sensed_price&&S("체감가",snap.actual_sensed_price)}</div>}
                      {snap.actual_result&&<div style={{fontSize:"12px",color:"#374151",background:"white",borderRadius:"6px",padding:"6px 8px",border:"1px solid #f3f4f6",marginBottom:"4px"}}><span style={{color:"#9ca3af",marginRight:"4px"}}>결과</span>{snap.actual_result}</div>}
                      {snap.memo&&<div style={{fontSize:"12px",color:"#6b7280",background:"white",borderRadius:"6px",padding:"6px 8px",border:"1px solid #f3f4f6",marginBottom:"4px"}}><span style={{color:"#9ca3af",marginRight:"4px"}}>메모</span>{snap.memo}</div>}
                      {snap.image_urls&&<div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"6px"}}>{snap.image_urls.split(",").filter(Boolean).map((url,ii)=><a key={ii} href={url} target="_blank" rel="noopener noreferrer"><img src={url} alt={"스크린샷"+(ii+1)} style={{width:"72px",height:"72px",objectFit:"cover",borderRadius:"6px",border:"1px solid #e5e7eb"}}/></a>)}</div>}
                      <div style={{fontSize:"11px",color:"#d1d5db",marginTop:"4px"}}>저장: {new Date(snap.saved_at).toLocaleString("ko-KR",{timeZone:"Asia/Seoul"})}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
