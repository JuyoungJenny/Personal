const emptyForm = () => ({ status:"미진행", testedAt:"", actualBenefitRate:"", actualSensedPrice:"", actualResult:"", memo:"" });
const calcPts = ss => {
  const b = ss.immediate - ss.productDiscount - ss.dupDiscount - ss.cartDiscount;
  return { basic: Math.floor(b*0.01), member: Math.floor(b*0.02) };
};

function App() {
  const [sel, setSel]         = useState(TEST_CASES[0]);
  const [varIdx, setVarIdx]   = useState(0);
  const [form, setForm]       = useState(emptyForm());
  const [snapshots, setSnaps] = useState([]);
  const [sidebar, setSidebar] = useState(true);
  const [saving, setSaving]   = useState(false);
  const [syncMsg, setSyncMsg] = useState("");
  const [loaded, setLoaded]   = useState(false);
  const [images, setImages]       = useState([]); // {name, url, path, uploading}
  const [statusCache, setStatusCache] = useState({});
  const fileRef = useRef();

  const ck = caseKey(sel.id, varIdx);

  useEffect(() => {
    setLoaded(false); setSnaps([]); setForm(emptyForm()); setImages([]);
    api.getRecords(ck).then(rows => {
      if (Array.isArray(rows) && rows.length > 0) {
        setSnaps(rows);
        const l = rows[0];
        setForm({ status:l.status??"미진행", testedAt:l.tested_at??"", actualBenefitRate:l.actual_benefit_rate??"", actualSensedPrice:l.actual_sensed_price??"", actualResult:l.actual_result??"", memo:l.memo??"" });
        setStatusCache(p => ({ ...p, [ck]: l.status??"미진행" }));
      }
      setLoaded(true); setSyncMsg("✅ 로드됨"); setTimeout(() => setSyncMsg(""), 1500);
    }).catch(() => { setLoaded(true); setSyncMsg("⚠️ 로드 실패"); });
  }, [ck]);

  const addSnapshot = async () => {
    setSaving(true);
    const imageUrls = images.filter(i => !i.uploading).map(i => i.url).join(',');
    const row = { case_id:ck, status:form.status, tested_at:form.testedAt||nowKST(), actual_benefit_rate:form.actualBenefitRate, actual_sensed_price:form.actualSensedPrice, actual_result:form.actualResult, memo:form.memo, image_urls: imageUrls || null };
    const rows = await api.addRecord(row);
    if (Array.isArray(rows) && rows[0]) { setSnaps(p => [rows[0],...p]); setStatusCache(p => ({...p,[ck]:form.status})); }
    setSaving(false); setSyncMsg("💾 기록 저장됨"); setTimeout(() => setSyncMsg(""), 1500);
  };

  const deleteSnap = async id => {
    await api.deleteRecord(id);
    setSnaps(p => { const n=p.filter(s=>s.id!==id); setStatusCache(c=>({...c,[ck]:n[0]?.status??"미진행"})); return n; });
  };

  const upd = (f,v) => setForm(p => ({...p,[f]:v}));
  const handleImages = e => {
    Array.from(e.target.files).forEach(async file => {
      const tempId = Date.now() + Math.random();
      const path = `${ck}/${tempId}_${file.name}`;
      // 로딩 상태로 먼저 추가
      setImages(prev => [...prev, { tempId, name: file.name, url: URL.createObjectURL(file), path, uploading: true }]);
      try {
        const url = await api.uploadImage(file, path);
        setImages(prev => prev.map(img => img.tempId === tempId ? { ...img, url, uploading: false } : img));
      } catch (e) {
        setImages(prev => prev.filter(img => img.tempId !== tempId));
        alert('이미지 업로드 실패: ' + e.message);
      }
    });
    e.target.value = "";
  };
  const removeImage = async (img) => {
    setImages(prev => prev.filter(i => i.tempId !== img.tempId));
    if (img.path) await api.deleteImage(img.path);
  };

  const pts = calcPts(sel.ss);
  const variant = sel.variants[varIdx];
  const getCaseStatus = tc => { const ss=tc.variants.map((_,vi)=>statusCache[caseKey(tc.id,vi)]??"미진행"); return ss.includes("실패 ❌")?"실패 ❌":ss.includes("블로킹 🚫")?"블로킹 🚫":ss.includes("진행중")?"진행중":ss.every(s=>s==="통과 ✅")?"통과 ✅":"미진행"; };
  const done = TEST_CASES.filter(tc=>getCaseStatus(tc)==="통과 ✅").length;

  return (
    <div style={{fontFamily:"'Nanum Gothic',sans-serif",height:"100vh",display:"flex",background:"#f9fafb",fontSize:"14px"}}>

      {/* Sidebar */}
      <div style={{width:sidebar?"288px":"0",overflow:"hidden",transition:"width 0.2s",background:"white",borderRight:"1px solid #e5e7eb",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"16px",background:"linear-gradient(to right,#16a34a,#10b981)"}}>
          <div style={{color:"white",fontWeight:"800",fontSize:"15px"}}>🧪 다프 테스트 트래커</div>
          <div style={{color:"#bbf7d0",fontSize:"11px",marginTop:"2px"}}>Supabase 실시간 연동</div>
          <div style={{color:"#bbf7d0",fontSize:"11px",marginTop:"4px"}}>{done}/{TEST_CASES.length} 완료</div>
          <div style={{marginTop:"8px",background:"#166534",borderRadius:"9999px",height:"6px"}}>
            <div style={{background:"white",borderRadius:"9999px",height:"6px",width:`${(done/TEST_CASES.length)*100}%`,transition:"width 0.3s"}}/>
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1,paddingTop:"8px",paddingBottom:"8px"}}>
          {GROUPS.map(g => (
            <div key={g}>
              <div style={{padding:"6px 12px",fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em"}}>{g}</div>
              {TEST_CASES.filter(tc=>tc.group===g).map(tc => {
                const st = getCaseStatus(tc);
                return (
                  <button key={tc.id} onClick={()=>{setSel(tc);setVarIdx(0);}} style={{width:"100%",textAlign:"left",padding:"8px 12px",borderLeft:`2px solid ${sel.id===tc.id?"#16a34a":"transparent"}`,background:sel.id===tc.id?"#f0fdf4":"transparent",border:"none",borderLeft:`2px solid ${sel.id===tc.id?"#16a34a":"transparent"}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"4px"}}>
                    <span style={{fontSize:"11px",color:"#374151",lineHeight:"1.4"}}>[{tc.id}] {tc.title}</span>
                    <span className={`text-xs px-1.5 py-0.5 rounded-full whitespace-nowrap flex-shrink-0 ${STATUS_COLORS[st]}`}>{st==="미진행"?"-":st.split(" ")[1]??st}</span>
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Topbar */}
        <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"10px 16px",display:"flex",alignItems:"center",gap:"12px"}}>
          <button onClick={()=>setSidebar(s=>!s)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:"#9ca3af"}}>☰</button>
          <div style={{flex:1}}>
            <div style={{fontWeight:"800",color:"#111827"}}>[{sel.id}] {sel.title}</div>
            <div style={{fontSize:"11px",color:"#9ca3af"}}>{sel.group}</div>
          </div>
          {(saving||syncMsg) && <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"9999px",background:saving?"#eff6ff":"#f0fdf4",color:saving?"#3b82f6":"#16a34a"}}>{saving?"💾 저장 중...":syncMsg}</span>}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:"12px"}}>

          {/* 세팅값 3열 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
            {/* 혜택 정책 */}
            <div style={{background:"white",borderRadius:"12px",border:"1px solid #e5e7eb",padding:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",marginBottom:"8px"}}>혜택 정책</div>
              {sel.variants.length > 1 && (
                <div style={{display:"flex",gap:"4px",marginBottom:"12px"}}>
                  {sel.variants.map((v,i) => (
                    <button key={i} onClick={()=>setVarIdx(i)} style={{flex:1,padding:"4px",borderRadius:"8px",fontSize:"11px",fontWeight:"800",border:`1px solid ${varIdx===i?"#16a34a":"#e5e7eb"}`,background:varIdx===i?"#16a34a":"white",color:varIdx===i?"white":"#6b7280",cursor:"pointer"}}>
                      {v.type.length>5?v.type.slice(0,3)+"…":v.type}
                    </button>
                  ))}
                </div>
              )}
              <Row label="유형" val={variant.type}/><Row label="열위 구간" val={variant.range??"-"}/><Row label="목표" val={variant.goal}/>
            </div>
            {/* 경쟁사 */}
            <div style={{background:"white",borderRadius:"12px",border:"1px solid #e5e7eb",padding:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",marginBottom:"8px"}}>경쟁사 가격</div>
              <Row label="경쟁사가" val={sel.competitor?`${fmt(sel.competitor)}원`:"미전파"} accent/>
            </div>
            {/* 스스 */}
            <div style={{background:"white",borderRadius:"12px",border:"1px solid #e5e7eb",padding:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",marginBottom:"8px"}}>스스 가격</div>
              <Row label="즉시할인 후 가격" val={`${fmt(sel.ss.immediate)}원`}/>
              {sel.ss.productDiscount>0&&<Row label="└ 상품할인" val={`-${fmt(sel.ss.productDiscount)}원`}/>}
              {sel.ss.dupDiscount>0&&<Row label="└ 상품중복할인" val={`-${fmt(sel.ss.dupDiscount)}원`}/>}
              {sel.ss.cartDiscount>0&&<Row label="└ 장바구니할인" val={`-${fmt(sel.ss.cartDiscount)}원`}/>}
              <Row label="기본적립(1%)" val={`-${fmt(pts.basic)}원`}/>
              <Row label="멤버십적립(2%)" val={`-${fmt(pts.member)}원`}/>
              {sel.ss.addPoint>0&&<Row label="추가적립" val={`-${fmt(sel.ss.addPoint)}원`}/>}
              {sel.ss.superPoint>0&&<Row label="슈퍼적립" val={`-${fmt(sel.ss.superPoint)}원`}/>}
              <Row label="배송비" val={`${fmt(sel.ss.delivery)}원`}/>
            </div>
          </div>

          {/* 기대결과 */}
          <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:"12px",padding:"16px"}}>
            <div style={{fontSize:"11px",fontWeight:"800",color:"#93c5fd",textTransform:"uppercase",marginBottom:"8px"}}>계산결과 (기대값)</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginBottom:"8px"}}>
              <Stat label="체감가(다프 적용 전)" val={`${fmt(sel.sensedPrice)}원`}/>
              <Stat label="열위비율" val={sel.inferiorRatio}/>
              <Stat label="기대 혜택비율" val={variant.benefitRate}/>
            </div>
            <div style={{paddingTop:"8px",borderTop:"1px solid #bfdbfe"}}>
              <div style={{fontSize:"11px",color:"#93c5fd",marginBottom:"2px"}}>기대결과</div>
              <div style={{fontWeight:"800",color:"#1e3a8a"}}>{variant.expected}</div>
              {sel.note&&<div style={{fontSize:"11px",color:"#3b82f6",marginTop:"4px"}}>📌 {sel.note}</div>}
            </div>
          </div>

          {/* 테스트 기록 입력 */}
          <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:"12px",padding:"16px",display:"flex",flexDirection:"column",gap:"12px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase"}}>테스트 기록 입력</div>
              <button onClick={addSnapshot} disabled={saving} style={{padding:"6px 16px",background:"#16a34a",color:"white",border:"none",borderRadius:"8px",fontSize:"12px",fontWeight:"800",cursor:"pointer",opacity:saving?0.5:1}}>
                {saving?"저장 중...":"+ 기록 추가"}
              </button>
            </div>
            <div style={{display:"flex",gap:"12px"}}>
              <div>
                <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>상태</label>
                <select value={form.status} onChange={e=>upd("status",e.target.value)} className={`rounded-lg border px-3 py-1.5 text-sm font-bold ${STATUS_COLORS[form.status]}`}>
                  {STATUS_OPTIONS.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>시각 (KST)</label>
                <div style={{display:"flex",gap:"4px"}}>
                  <input type="datetime-local" value={form.testedAt} onChange={e=>upd("testedAt",e.target.value)} style={{flex:1,border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px"}}/>
                  <button onClick={()=>upd("testedAt",nowKST())} style={{padding:"6px 12px",background:"#f0fdf4",border:"1px solid #86efac",color:"#16a34a",borderRadius:"8px",fontSize:"11px",fontWeight:"800",cursor:"pointer",whiteSpace:"nowrap"}}>지금</button>
                </div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
              <div>
                <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>실제 적용된 혜택 비율</label>
                <input value={form.actualBenefitRate} onChange={e=>upd("actualBenefitRate",e.target.value)} placeholder="예: 9%" style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",boxSizing:"border-box"}}/>
              </div>
              <div>
                <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>실제 체감가</label>
                <input value={form.actualSensedPrice} onChange={e=>upd("actualSensedPrice",e.target.value)} placeholder="예: 11,476" style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",boxSizing:"border-box"}}/>
              </div>
            </div>
            <div>
              <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>실제 결과 / 이슈 내용</label>
              <textarea value={form.actualResult} onChange={e=>upd("actualResult",e.target.value)} rows={2} placeholder="기대값과 다른 경우 실제 결과를 기록하세요..." style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",resize:"none",boxSizing:"border-box"}}/>
            </div>
            <div>
              <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>메모</label>
              <textarea value={form.memo} onChange={e=>upd("memo",e.target.value)} rows={2} placeholder="테스트 조건, 특이사항 등 자유롭게..." style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",resize:"none",boxSizing:"border-box"}}/>
            </div>
            <div>
              <label style={{fontSize:"11px",color:"#6b7280",display:"block",marginBottom:"4px"}}>스크린샷 <span style={{color:"#9ca3af"}}>(이 기기에서만 보임)</span></label>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {images.map((img,i)=>(
                  <div key={img.tempId ?? i} style={{position:"relative",width:"80px",height:"80px",borderRadius:"8px",overflow:"hidden",border:"1px solid #e5e7eb"}}>
                    <img src={img.url} alt={img.name} style={{width:"100%",height:"100%",objectFit:"cover",opacity:img.uploading?0.5:1}}/>
                    {img.uploading && <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px"}}>⏳</div>}
                    {!img.uploading && <button onClick={()=>removeImage(img)} style={{position:"absolute",top:"2px",right:"2px",background:"#ef4444",color:"white",border:"none",borderRadius:"9999px",width:"16px",height:"16px",fontSize:"10px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>}
                  </div>
                ))}
                <button onClick={()=>fileRef.current.click()} style={{width:"80px",height:"80px",borderRadius:"8px",border:"2px dashed #d1d5db",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#9ca3af",gap:"4px"}}>
                  <span style={{fontSize:"20px",lineHeight:1}}>+</span><span style={{fontSize:"11px"}}>추가</span>
                </button>
              </div>
              <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleImages}/>
            </div>
          </div>

          {/* 저장된 기록 타임라인 */}
          {!loaded ? (
            <div style={{textAlign:"center",padding:"16px",color:"#9ca3af",fontSize:"12px"}}>기록 불러오는 중...</div>
          ) : snapshots.length === 0 ? (
            <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:"12px",padding:"24px",textAlign:"center",color:"#9ca3af",fontSize:"12px"}}>
              아직 저장된 기록이 없어요. 위에서 작성 후 <strong>+ 기록 추가</strong>를 눌러주세요.
            </div>
          ) : (
            <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:"12px",padding:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#9ca3af",textTransform:"uppercase",marginBottom:"12px"}}>
                저장된 기록 <span style={{background:"#dcfce7",color:"#16a34a",padding:"2px 6px",borderRadius:"9999px",fontSize:"11px"}}>{snapshots.length}개</span>
              </div>
              <div style={{position:"relative",paddingLeft:"16px"}}>
                <div style={{position:"absolute",left:"7px",top:"8px",bottom:"8px",width:"2px",background:"#e5e7eb"}}/>
                {snapshots.map((snap,i)=>(
                  <div key={snap.id} style={{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"12px",position:"relative"}}>
                    <div style={{position:"relative",zIndex:1,width:"12px",height:"12px",borderRadius:"9999px",background:i===0?"#16a34a":"#d1d5db",border:"2px solid white",flexShrink:0,marginTop:"6px"}}/>
                    <div style={{flex:1,background:"#f9fafb",borderRadius:"12px",border:"1px solid #f3f4f6",padding:"12px"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          <span className={`text-xs px-2 py-0.5 rounded-full font-bold ${STATUS_COLORS[snap.status]}`}>{snap.status}</span>
                          <span style={{fontSize:"11px",color:"#9ca3af"}}>{snap.tested_at?snap.tested_at.replace("T"," "):"시각 없음"}</span>
                        </div>
                        <button onClick={()=>deleteSnap(snap.id)} style={{fontSize:"11px",color:"#d1d5db",background:"none",border:"none",cursor:"pointer"}}>삭제</button>
                      </div>
                      {(snap.actual_benefit_rate||snap.actual_sensed_price)&&(
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"6px"}}>
                          {snap.actual_benefit_rate&&<Row label="혜택 비율" val={snap.actual_benefit_rate}/>}
                          {snap.actual_sensed_price&&<Row label="체감가" val={snap.actual_sensed_price}/>}
                        </div>
                      )}
                      {snap.actual_result&&<div style={{fontSize:"12px",color:"#374151",background:"white",borderRadius:"6px",padding:"6px 8px",border:"1px solid #f3f4f6",marginBottom:"4px"}}><span style={{color:"#9ca3af",marginRight:"4px"}}>결과</span>{snap.actual_result}</div>}
                      {snap.memo&&<div style={{fontSize:"12px",color:"#6b7280",background:"white",borderRadius:"6px",padding:"6px 8px",border:"1px solid #f3f4f6",marginBottom:"4px"}}><span style={{color:"#9ca3af",marginRight:"4px"}}>메모</span>{snap.memo}</div>}
                      {snap.image_urls && (
                        <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"6px"}}>
                          {snap.image_urls.split(',').filter(Boolean).map((url,i)=>(
                            <a key={i} href={url} target="_blank" rel="noopener noreferrer">
                              <img src={url} alt={`스크린샷${i+1}`} style={{width:"72px",height:"72px",objectFit:"cover",borderRadius:"6px",border:"1px solid #e5e7eb"}}/>
                            </a>
                          ))}
                        </div>
                      )}
                      <div style={{fontSize:"11px",color:"#d1d5db",marginTop:"4px"}}>저장: {new Date(snap.saved_at).toLocaleString("ko-KR",{timeZone:"Asia/Seoul"})}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Row({label,val,accent}) {
  return <div style={{display:"flex",justifyContent:"space-between",padding:"2px 0"}}>
    <span style={{fontSize:"11px",color:"#6b7280"}}>{label}</span>
    <span style={{fontSize:"11px",fontWeight:"800",color:accent?"#dc2626":"#111827"}}>{val}</span>
  </div>;
}
function Stat({label,val}) {
  return <div>
    <div style={{fontSize:"11px",color:"#93c5fd"}}>{label}</div>
    <div style={{fontWeight:"800",color:"#1e3a8a",fontSize:"15px"}}>{val}</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
